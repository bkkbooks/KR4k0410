body:
  text: 零陵先賢傳劉巴劉先生欲遣周不疑就劉巴學巴曰昔游荊北時涉師門記問之學不足紀名猶天之南箕虛而不用賜書乃欲賢甥摧鸞鳳之翮游燕雀之宇將何以啟明之哉鄭產鄭產零陵人為白土鄉嗇夫時民家產子一歲輒出口錢以故貧家鮮有舉子者產勸百姓勿殺子口錢皆為代出郡縣具以聞上錢因得免改白土曰更生生鄉葉譚葉譚字令思零陵人少負節操未幾舉孝廉王濟謂譚曰君吳楚人也亡國之餘有何秀異而應斯舉譚曰君不聞明珠大貝獨生江海之濱乎為之武子默然蔡倫蔡倫字仲敬零桂人少負才官常侍造紙有聲
